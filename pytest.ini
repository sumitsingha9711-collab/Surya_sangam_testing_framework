[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v
markers =
    homepage: tests that validate the Surya Sangam homepage
    about: tests that validate the Surya Sangam About page
    calculator: tests that validate the Surya Sangam solar calculator
    services: tests that validate the Surya Sangam services module
    blog: tests that validate the Surya Sangam blog section
    navigation: tests that validate homepage navigation links
    buttons: tests that validate homepage CTA buttons
    contact: tests that validate the contact page and contact form
    contact_validation: Person 2 Contact Page validation and security tests
    blogs: Person 2 Phase 7 Blog validation tests
